<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ResQ Guard</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --sos-red: #dc3545; --amb-green: #198754; --warning-orange: #fd7e14; }
        body { background: #f8f9fa; font-family: 'Segoe UI', system-ui, sans-serif; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Smooth Page Transitions */
        .page { display: none; min-height: 100vh; padding: 20px; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GIANT SOS BUTTON */
        .sos-btn-container { position: relative; margin: 40px 0; }
        .sos-btn {
            width: 280px; height: 280px; font-size: 4rem;
            border: 15px solid rgba(220, 53, 69, 0.1);
            box-shadow: 0 20px 50px rgba(220, 53, 69, 0.4);
            animation: pulse-red 2s infinite;
            transition: transform 0.1s ease;
            z-index: 5;
        }
        .sos-btn:active { transform: scale(0.9); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        /* Cards & UI Elements */
        .card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .history-item { border-left: 5px solid var(--sos-red); background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid #eee;
            height: 85px; display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #bbb; text-align: center; flex: 1; cursor: pointer; border: none; background: none; outline: none; transition: 0.2s; }
        .nav-item.active { color: var(--sos-red); }
        .nav-item i { font-size: 1.6rem; display: block; }
        .nav-item span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="home" class="page active align-items-center justify-content-center">
        <div class="text-center mb-2">
            <h1 class="fw-black text-dark mb-0">ResQ Guard</h1>
            <p id="userNameDisplay" class="text-muted small fw-bold text-uppercase tracking-widest">System Active</p>
        </div>

        <a href="tel:911" id="emergencyCall" class="btn btn-warning w-100 mb-3 rounded-pill fw-bold py-3 shadow-sm" style="max-width:350px;">
            <i class="bi bi-telephone-fill me-2"></i> CALL EMERGENCY
        </a>
        
        <div class="sos-btn-container">
            <button class="btn btn-danger rounded-circle sos-btn fw-bold" onclick="triggerSOS()">SOS</button>
        </div>
        
        <div id="quickAmbList" class="w-100 px-3 d-none" style="max-width: 400px;">
            <p class="text-center extra-small fw-bold text-success mb-2">QUICK CALL AMBULANCE</p>
            <div id="ambButtons" class="d-grid gap-2 mb-4"></div>
        </div>

        <div class="w-100 px-3" style="max-width: 400px;">
            <div id="statusBox" class="bg-white border rounded-pill shadow-sm text-center py-2">
                <small id="locationStatus" class="fw-bold text-secondary small">
                    <i class="bi bi-geo-alt-fill text-danger"></i> GPS STANDBY
                </small>
            </div>
        </div>
    </div>

    <div id="history" class="page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Alert Logs</h2>
            <button class="btn btn-sm btn-outline-danger" onclick="clearHistory()">Clear</button>
        </div>
        <div id="historyList"></div>
    </div>

    <div id="settings" class="page">
        <h2 class="fw-bold mb-4">Setup</h2>
        
        <div class="card p-3 border-start border-danger border-5">
            <label class="form-label small fw-bold">My Identity</label>
            <input type="text" id="userName" class="form-control mb-2" placeholder="Your Name">
            <input type="tel" id="userPhone" class="form-control" placeholder="Your Phone Number">
        </div>

        <div class="card p-3 border-start border-success border-5">
            <label class="form-label small fw-bold text-success">Ambulance Drivers (Max 3)</label>
            <input type="tel" id="amb1" class="form-control mb-1" placeholder="Ambulance Number 1">
            <input type="tel" id="amb2" class="form-control mb-1" placeholder="Ambulance Number 2">
            <input type="tel" id="amb3" class="form-control" placeholder="Ambulance Number 3">
        </div>

        <div class="card p-3 shadow-sm">
            <label class="form-label small fw-bold text-primary">Alert Channels</label>
            <input type="text" id="waGroup" class="form-control mb-2" placeholder="WhatsApp Group Link">
            <input type="tel" id="emergencyNum" class="form-control" placeholder="Police/Emergency Number (911)">
        </div>

        <button class="btn btn-danger w-100 py-3 fw-bold rounded-4 shadow-lg mb-4" onclick="saveAll()">SAVE CONFIGURATION</button>
    </div>

    <nav class="nav-bottom">
        <button class="nav-item active" onclick="navTo('home', this)">
            <i class="bi bi-house-door-fill"></i><span>Home</span>
        </button>
        <button class="nav-item" onclick="navTo('history', this); loadHistory();">
            <i class="bi bi-clock-history"></i><span>History</span>
        </button>
        <button id="nav-settings" class="nav-item" onclick="navTo('settings', this)">
            <i class="bi bi-gear-fill"></i><span>Setup</span>
        </button>
    </nav>

    <script>
        // PAGE NAVIGATION
        function navTo(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        const fields = ['userName', 'userPhone', 'waGroup', 'emergencyNum', 'amb1', 'amb2', 'amb3'];

        function saveAll() {
            fields.forEach(f => localStorage.setItem(f, document.getElementById(f).value));
            alert("Settings Saved!");
            location.reload();
        }

        // SOS TRIGGER WITH ERROR HANDLING
        function triggerSOS() {
            const uName = localStorage.getItem('userName') || "Unknown User";
            const waLink = localStorage.getItem('waGroup');
            const status = document.getElementById('locationStatus');

            if(!waLink) {
                alert("Please add a WhatsApp Link in Setup first!");
                return navTo('settings', document.getElementById('nav-settings'));
            }

            status.innerHTML = '<span class="spinner-border spinner-border-sm text-danger"></span> LOCATING...';
            if(navigator.vibrate) navigator.vibrate([1000, 200, 1000]);

            const geoOptions = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    saveToHistory(lat, lon, mapUrl);
                    
                    const message = `🚨 *SOS EMERGENCY* 🚨\n*Name:* ${uName}\n*Location:* ${mapUrl}`;
                    window.location.href = `https://wa.me/?text=${encodeURIComponent(message)}`;
                    status.innerText = "GPS READY";
                },
                (err) => {
                    let msg = "GPS ERROR: ";
                    if (err.code === 1) msg += "Permission Denied. Please enable GPS in browser.";
                    else if (err.code === 2) msg += "Position Unavailable.";
                    else if (err.code === 3) msg += "Timeout. Check signal.";
                    status.innerHTML = `<span class="text-danger">${msg}</span>`;
                    alert(msg);
                }, 
                geoOptions
            );
        }

        // HISTORY LOGIC
        function saveToHistory(lat, lon, link) {
            let logs = JSON.parse(localStorage.getItem('sos_logs') || '[]');
            logs.unshift({ time: new Date().toLocaleString(), coords: `${lat}, ${lon}`, link: link });
            localStorage.setItem('sos_logs', JSON.stringify(logs.slice(0, 10)));
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('sos_logs') || '[]');
            list.innerHTML = logs.length ? "" : "<p class='text-center text-muted mt-5'>No recent alerts found.</p>";
            logs.forEach(log => {
                list.innerHTML += `
                    <div class="history-item shadow-sm">
                        <div class="fw-bold small text-danger">${log.time}</div>
                        <div class="extra-small text-muted mb-2">LAT/LON: ${log.coords}</div>
                        <a href="${log.link}" target="_blank" class="btn btn-sm btn-light py-1 fw-bold">OPEN MAP</a>
                    </div>`;
            });
        }

        function clearHistory() { if(confirm("Clear logs?")) { localStorage.removeItem('sos_logs'); loadHistory(); } }

        // INITIAL LOAD
        window.onload = () => {
            // Fill Inputs
            fields.forEach(f => document.getElementById(f).value = localStorage.getItem(f) || '');
            
            // Set Emergency Call
            const eNum = localStorage.getItem('emergencyNum') || '911';
            const eCall = document.getElementById('emergencyCall');
            eCall.href = `tel:${eNum}`;
            eCall.innerHTML = `<i class="bi bi-telephone-fill me-2"></i> CALL ${eNum}`;

            // Display Name
            const savedName = localStorage.getItem('userName');
            if(savedName) document.getElementById('userNameDisplay').innerText = "User: " + savedName;

            // Load Ambulance Buttons
            const ambDiv = document.getElementById('ambButtons');
            let hasAmb = false;
            ['amb1', 'amb2', 'amb3'].forEach((key, idx) => {
                const val = localStorage.getItem(key);
                if(val) {
                    ambDiv.innerHTML += `<a href="tel:${val}" class="btn btn-outline-success rounded-pill fw-bold py-2"><i class="bi bi-telephone"></i> DRIVER ${idx+1}: ${val}</a>`;
                    hasAmb = true;
                }
            });
            if(hasAmb) document.getElementById('quickAmbList').classList.remove('d-none');
        };
    </script>
</body>
</html>
