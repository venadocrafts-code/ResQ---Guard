<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical SOS Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --sos-red: #ff3b30; --medical-blue: #007aff; --glass: rgba(255, 255, 255, 0.8); }
        
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh; margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }

        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-ring { 
            0% { transform: scale(0.33); } 
            80%, 100% { opacity: 0; } 
        }
        @keyframes heart-beat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        .page { display: none; padding: 25px; animation: slideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .page.active { display: block; }

        /* SOS Button Design */
        .sos-wrapper { 
            position: relative; width: 280px; height: 280px; margin: 40px auto; 
            display: flex; align-items: center; justify-content: center;
        }
        .sos-ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--sos-red); border-radius: 50%;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .sos-btn {
            width: 220px; height: 220px; border-radius: 50%;
            background: var(--sos-red); color: white; border: 8px solid white;
            font-size: 3.5rem; font-weight: 900; z-index: 2;
            box-shadow: 0 15px 35px rgba(255, 59, 48, 0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            animation: heart-beat 1.5s infinite;
        }
        .sos-btn:active { transform: scale(0.9); animation: none; }

        /* Glass Cards */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 24px;
            padding: 20px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            margin-bottom: 20px;
        }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-radius: 25px; display: flex; justify-content: space-around;
            align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-btn { background: none; border: none; color: #777; transition: 0.3s; text-align: center; }
        .nav-btn.active { color: #fff; transform: translateY(-5px); }
        .nav-btn i { font-size: 1.5rem; }
        .nav-btn span { font-size: 0.6rem; display: block; font-weight: bold; text-transform: uppercase; margin-top: 2px; }

        .form-control { 
            border-radius: 12px; border: 1px solid #eee; padding: 12px; 
            background: rgba(255,255,255,0.5); 
        }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="text-center mb-4">
            <h1 class="fw-bold text-dark mb-0">ELITE <span class="text-danger">GUARD</span></h1>
            <div id="userTag" class="badge bg-white text-dark shadow-sm py-2 px-3 rounded-pill mt-2 opacity-75">
                <i class="bi bi-person-circle me-1 text-danger"></i> READY
            </div>
        </div>

        <div class="sos-wrapper">
            <div class="sos-ring"></div>
            <div class="sos-ring" style="animation-delay: 0.5s"></div>
            <button class="sos-btn" onclick="triggerSOS()">SOS</button>
        </div>

        <div class="text-center">
            <button class="btn btn-dark rounded-pill px-5 py-2 fw-bold shadow-lg" onclick="sendSafe()">
                <i class="bi bi-shield-check text-success me-2"></i>I AM STABLE
            </button>
            <p id="gps-status" class="mt-4 small fw-bold text-secondary"><i class="bi bi-broadcast"></i> SATELLITE STANDBY</p>
        </div>
    </div>

    <div id="logs" class="page">
        <h2 class="fw-bold mb-4">Alert History</h2>
        <div id="log-container"></div>
    </div>

    <div id="setup" class="page">
        <h2 class="fw-bold mb-4">Secure Setup</h2>
        <div class="glass-card">
            <label class="small fw-bold text-muted mb-2">PERSONAL IDENTITY</label>
            <input type="text" id="inName" class="form-control mb-3" placeholder="Patient Full Name">
            <input type="tel" id="inPhone" class="form-control mb-3" placeholder="Emergency Contact Number">
            
            <label class="small fw-bold text-muted mb-2">WHATSAPP GROUP LINK</label>
            <input type="text" id="inGroup" class="form-control mb-2" placeholder="https://chat.whatsapp.com/...">
            <div class="alert alert-info py-2" style="font-size: 0.7rem;">
                <i class="bi bi-info-circle"></i> Paste the <b>Invite Link</b> from your WhatsApp Group info.
            </div>
        </div>
        <button class="btn btn-danger w-100 py-3 rounded-4 fw-bold shadow-lg" onclick="saveSettings()">ACTIVATE SYSTEM</button>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('home', this)"><i class="bi bi-heart-pulse"></i><span>Emergency</span></button>
        <button class="nav-btn" onclick="showTab('logs', this); renderLogs();"><i class="bi bi-journal-text"></i><span>History</span></button>
        <button class="nav-btn" onclick="showTab('setup', this)"><i class="bi bi-person-gear"></i><span>Identity</span></button>
    </nav>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('sos_name', document.getElementById('inName').value);
            localStorage.setItem('sos_phone', document.getElementById('inPhone').value);
            localStorage.setItem('sos_group', document.getElementById('inGroup').value);
            alert("Security Protocols Activated!");
            location.reload();
        }

        function triggerSOS() {
            const name = localStorage.getItem('sos_name') || "Unknown";
            const phone = localStorage.getItem('sos_phone') || "N/A";
            const groupLink = localStorage.getItem('sos_group');
            const status = document.getElementById('gps-status');

            if(!groupLink) return showTab('setup', document.querySelectorAll('.nav-btn')[2]);

            status.innerHTML = '<span class="spinner-border spinner-border-sm"></span> SECURING GPS COORDINATES...';

            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                // History Update
                let h = JSON.parse(localStorage.getItem('sos_history') || '[]');
                h.unshift({time: new Date().toLocaleString(), map: mapLink});
                localStorage.setItem('sos_history', JSON.stringify(h.slice(0,10)));

                // THE MESSAGE (Clean & Professional)
                const text = `🏥 *MEDICAL EMERGENCY REPORT* 🏥\n\n*PATIENT:* ${name}\n*PHONE:* ${phone}\n*LOCATION:* ${mapLink}\n\n*STATUS:* Immediate medical assistance required!`;
                
                // FIX: If the group link fails, this uses the API method to send message
                // We use the wa.me protocol as a bridge
                const encodedMsg = encodeURIComponent(text);
                
                // If the user provided a full link, we try to force the text
                const finalUrl = `${groupLink}?text=${encodedMsg}`;
                
                window.location.href = finalUrl;
            }, (err) => alert("GPS Failed! Enable location."), {enableHighAccuracy: true});
        }

        function sendSafe() {
            const link = localStorage.getItem('sos_group');
            if(!link) return;
            const text = encodeURIComponent(`✅ *STABLE STATUS UPDATE*\nPatient Name: ${localStorage.getItem('sos_name')}\nI am now safe and stable. No further help needed.`);
            window.location.href = `${link}?text=${text}`;
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const logs = JSON.parse(localStorage.getItem('sos_history') || '[]');
            if(!logs.length) { container.innerHTML = '<p class="text-center opacity-50 mt-5">No Security Logs.</p>'; return; }
            container.innerHTML = logs.map(l => `
                <div class="glass-card mb-2">
                    <div class="d-flex justify-content-between">
                        <span class="text-danger fw-bold small">MEDICAL SOS SENT</span>
                        <span class="text-muted small">${l.time}</span>
                    </div>
                    <a href="${l.map}" target="_blank" class="btn btn-sm btn-outline-dark w-100 mt-2">Open Location Map</a>
                </div>
            `).join('');
        }

        window.onload = () => {
            document.getElementById('inName').value = localStorage.getItem('sos_name') || '';
            document.getElementById('inPhone').value = localStorage.getItem('sos_phone') || '';
            document.getElementById('inGroup').value = localStorage.getItem('sos_group') || '';
            if(localStorage.getItem('sos_name')) document.getElementById('userTag').innerText = "PROTECTING: " + localStorage.getItem('sos_name');
        };
    </script>
</body>
</html>
