<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical SOS Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --sos-red: #dc3545; --medical-blue: #0dcaf0; }
        body { background: #f4f7f9; font-family: 'Segoe UI', system-ui, sans-serif; padding-bottom: 100px; }
        
        .page { display: none; min-height: 100vh; padding: 20px; animation: slideUp 0.4s ease-out; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sos-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sos-btn {
            width: 260px; height: 260px; font-size: 4.5rem;
            border: 12px solid rgba(220, 53, 69, 0.15);
            box-shadow: 0 25px 60px rgba(220, 53, 69, 0.4);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 35px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .setup-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 20px; }
        .form-control { border-radius: 12px; padding: 12px 15px; background: #f9fafb; border: 1px solid #eee; }

        .nav-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0,0,0,0.05); height: 85px;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #aaa; text-align: center; flex: 1; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--sos-red); }
        .nav-item i { font-size: 1.6rem; display: block; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="text-center mt-3">
            <h2 class="fw-bold text-dark mb-0">MEDICAL <span class="text-danger">SOS</span></h2>
            <p id="userNameDisplay" class="text-muted small fw-bold">EMERGENCY DISPATCH READY</p>
        </div>

        <div class="sos-container">
            <button class="btn btn-danger rounded-circle sos-btn fw-bold mb-5" onclick="triggerSOS()">SOS</button>
            <button class="btn btn-success rounded-pill px-5 py-2 fw-bold shadow-sm" onclick="sendSafeMessage()">
                <i class="bi bi-check-circle-fill me-2"></i>I AM STABLE
            </button>
        </div>
        
        <div class="w-100 px-3 mx-auto" style="max-width: 400px;">
            <div id="statusBox" class="bg-white border-0 rounded-4 shadow-sm text-center py-2">
                <small id="locationStatus" class="fw-bold text-secondary small">
                    <i class="bi bi-heart-pulse-fill text-danger me-1"></i> SENSOR ACTIVE
                </small>
            </div>
        </div>
    </div>

    <div id="history" class="page">
        <h3 class="fw-bold mb-4">Medical Logs</h3>
        <div id="historyList"></div>
    </div>

    <div id="settings" class="page">
        <h3 class="fw-bold mb-4 text-center">Medical Profile</h3>
        
        <div class="setup-card">
            <label class="fw-bold small text-muted mb-2">PATIENT DETAILS</label>
            <input type="text" id="userName" class="form-control mb-2" placeholder="Patient Full Name">
            <input type="tel" id="userPhone" class="form-control" placeholder="Contact Number">
        </div>

        <div class="setup-card">
            <label class="fw-bold small text-muted mb-2">WHATSAPP DISPATCH GROUP</label>
            <input type="text" id="waGroup" class="form-control" placeholder="Paste Group Invite Link">
            <small class="text-muted d-block mt-2" style="font-size: 0.7rem;">Alerts will be sent directly to this group.</small>
        </div>

        <button class="btn btn-danger w-100 py-3 fw-bold rounded-4 shadow-lg mb-5" onclick="saveAll()">
            SAVE MEDICAL DATA
        </button>
    </div>

    <nav class="nav-bottom">
        <button class="nav-item active" onclick="navTo('home', this)">
            <i class="bi bi-plus-circle-fill"></i><span>SOS</span>
        </button>
        <button class="nav-item" onclick="navTo('history', this); loadHistory();">
            <i class="bi bi-activity"></i><span>Logs</span>
        </button>
        <button class="nav-item" onclick="navTo('settings', this)">
            <i class="bi bi-person-vcard"></i><span>Setup</span>
        </button>
    </nav>

    <script>
        function navTo(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }

        const fields = ['userName', 'userPhone', 'waGroup'];

        function saveAll() {
            fields.forEach(f => localStorage.setItem(f, document.getElementById(f).value));
            alert("Medical Profile Updated!");
            location.reload();
        }

        function triggerSOS() {
            const uName = localStorage.getItem('userName') || "Unknown Patient";
            const uPhone = localStorage.getItem('userPhone') || "N/A";
            const waGroupInput = localStorage.getItem('waGroup');
            const statusBox = document.getElementById('locationStatus');

            if(!waGroupInput || !waGroupInput.includes('chat.whatsapp.com/')) {
                alert("Please add your WhatsApp Group Link in Setup!");
                return navTo('settings', document.querySelectorAll('.nav-item')[2]);
            }

            const groupId = waGroupInput.split('/').pop();
            statusBox.innerHTML = '<span class="spinner-border spinner-border-sm text-danger"></span> LOCATING PATIENT...';

            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapUrl = `http://maps.google.com/maps?q=${lat},${lon}`;
                
                // Log to History
                let logs = JSON.parse(localStorage.getItem('med_logs') || '[]');
                logs.unshift({ time: new Date().toLocaleString(), url: mapUrl });
                localStorage.setItem('med_logs', JSON.stringify(logs.slice(0, 10)));

                // THE MESSAGE: Formatted for Medical Emergency
                const message = `🏥 *MEDICAL EMERGENCY* 🏥\n\n*Patient:* ${uName}\n*Phone:* ${uPhone}\n*Location:* ${mapUrl}\n\n*Status:* Immediate assistance required!`;
                
                // Open WhatsApp Group directly
                window.location.href = `https://chat.whatsapp.com/${groupId}?text=${encodeURIComponent(message)}`;
            }, (err) => alert("GPS Failed. Please enable location."), { enableHighAccuracy: true });
        }

        function sendSafeMessage() {
            const waGroupInput = localStorage.getItem('waGroup');
            if(!waGroupInput) return;
            const groupId = waGroupInput.split('/').pop();
            const message = `✅ *PATIENT STABLE*\nSituation resolved. Patient is no longer in danger.`;
            window.location.href = `https://chat.whatsapp.com/${groupId}?text=${encodeURIComponent(message)}`;
        }

        function loadHistory() {
            const container = document.getElementById('historyList');
            const logs = JSON.parse(localStorage.getItem('med_logs') || '[]');
            if(!logs.length) { container.innerHTML = '<p class="text-center mt-5 text-muted">No logs found.</p>'; return; }
            container.innerHTML = logs.map(log => `
                <div class="setup-card mb-2">
                    <div class="d-flex justify-content-between small fw-bold">
                        <span class="text-danger">MEDICAL ALERT</span>
                        <span class="text-muted">${log.time}</span>
                    </div>
                    <a href="${log.url}" target="_blank" class="btn btn-sm btn-outline-dark w-100 mt-2">View Event Location</a>
                </div>
            `).join('');
        }

        window.onload = () => {
            fields.forEach(f => document.getElementById(f).value = localStorage.getItem(f) || '');
            if(localStorage.getItem('userName')) document.getElementById('userNameDisplay').innerText = "PATIENT: " + localStorage.getItem('userName');
        };
    </script>
</body>
</html>
