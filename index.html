<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS Guard Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sos: #ff3b30; --dark: #1c1c1e; --med: #007aff; }
        body { background: #f2f2f7; font-family: -apple-system, sans-serif; padding-bottom: 100px; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        .sos-btn {
            width: 220px; height: 220px; background: var(--sos); border-radius: 50%;
            border: 10px solid white; color: white; font-size: 3.5rem; font-weight: 900;
            box-shadow: 0 20px 40px rgba(255, 59, 48, 0.4);
            animation: pulse 2s infinite; margin: 40px auto; display: block;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 30px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .glass-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.02); }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--dark); border-radius: 25px; height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: #8e8e93; text-decoration: none; text-align: center; flex: 1; }
        .nav-link.active { color: white; }
        .nav-link i { font-size: 1.5rem; display: block; }
        .form-control { border-radius: 12px; background: #f9f9f9; border: 1px solid #eee; padding: 12px; font-size: 0.9rem; }
        .driver-badge { background: #eef2ff; color: var(--med); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div id="home" class="page active text-center">
        <h2 class="fw-bold mt-4">MEDICAL <span class="text-danger">SOS</span></h2>
        <div id="statusHeader" class="small text-muted fw-bold mb-2">3 DRIVERS CONNECTED</div>
        
        <button class="sos-btn" onclick="triggerTripleSOS()">SOS</button>
        
        <div class="d-grid gap-2 px-4">
            <button class="btn btn-dark rounded-pill py-3 fw-bold shadow" onclick="sendSafeToAll()">
                <i class="bi bi-shield-check text-success me-2"></i>I AM NOW SAFE
            </button>
        </div>
        <p id="gps" class="small text-secondary mt-4 fw-bold"><i class="bi bi-geo-alt-fill"></i> GPS STANDBY</p>
    </div>

    <div id="setup" class="page">
        <h3 class="fw-bold mb-4 text-center">Medical Config</h3>
        
        <div class="glass-card">
            <label class="small fw-bold text-muted mb-1">PATIENT INFO</label>
            <input type="text" id="name" class="form-control mb-2" placeholder="Full Name">
            <div class="row g-2">
                <div class="col-6"><input type="text" id="blood" class="form-control" placeholder="Blood Type"></div>
                <div class="col-6"><input type="text" id="allergies" class="form-control" placeholder="Allergies"></div>
            </div>
        </div>

        <div class="glass-card">
            <label class="small fw-bold text-danger mb-2 text-uppercase">Driver Dispatch Contacts</label>
            <div class="mb-3">
                <span class="driver-badge">DRIVER 1 (Primary)</span>
                <input type="tel" id="d1" class="form-control" placeholder="Phone with Country Code (e.g. 44...)">
            </div>
            <div class="mb-3">
                <span class="driver-badge">DRIVER 2</span>
                <input type="tel" id="d2" class="form-control" placeholder="Phone with Country Code">
            </div>
            <div class="mb-0">
                <span class="driver-badge">DRIVER 3</span>
                <input type="tel" id="d3" class="form-control" placeholder="Phone with Country Code">
            </div>
        </div>
        
        <button class="btn btn-danger w-100 py-3 rounded-4 fw-bold shadow" onclick="saveAll()">ACTIVATE ALL DRIVERS</button>
    </div>

    <div id="logs" class="page">
        <h3 class="fw-bold mb-4 text-center">Emergency Logs</h3>
        <div id="logItems"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-link active" onclick="tab('home', this)"><i class="bi bi-heart-pulse-fill"></i><span>SOS</span></a>
        <a href="#" class="nav-link" onclick="tab('logs', this); renderLogs();"><i class="bi bi-activity"></i><span>Logs</span></a>
        <a href="#" class="nav-link" onclick="tab('setup', this)"><i class="bi bi-person-vcard-fill"></i><span>Setup</span></a>
    </nav>

    <script>
        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        const fields = ['name', 'blood', 'allergies', 'd1', 'd2', 'd3'];

        function saveAll() {
            fields.forEach(f => localStorage.setItem('med_' + f, document.getElementById(f).value));
            alert("Driver Network & Medical Data Saved!");
            location.reload();
        }

        async function triggerTripleSOS() {
            const n = localStorage.getItem('med_name') || "Patient";
            const b = localStorage.getItem('med_blood') || "N/A";
            const a = localStorage.getItem('med_allergies') || "N/A";
            const d1 = localStorage.getItem('med_d1');
            const d2 = localStorage.getItem('med_d2');
            const d3 = localStorage.getItem('med_d3');

            if(!d1) { 
                alert("Please setup at least Driver 1!"); 
                return tab('setup', document.querySelectorAll('.nav-link')[2]); 
            }

            document.getElementById('gps').innerHTML = '<span class="spinner-border spinner-border-sm"></span> LOCATING PATIENT...';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const msg = `🏥 *MEDICAL SOS ALERT* 🏥\n\n*Patient:* ${n}\n*Blood:* ${b}\n*Allergies:* ${a}\n*Location:* ${map}\n\n*STATUS:* URGENT HELP NEEDED!`;

                // Backup Copy
                try { await navigator.clipboard.writeText(msg); } catch(e) {}

                // Save to history
                let h = JSON.parse(localStorage.getItem('h_logs') || '[]');
                h.unshift({t: new Date().toLocaleString(), m: map});
                localStorage.setItem('h_logs', JSON.stringify(h.slice(0,10)));

                // Alert Driver 1 (Primary)
                const target = d1.replace(/\D/g,'');
                alert("Alerting Driver 1...");
                window.location.href = `https://wa.me/${target}?text=${encodeURIComponent(msg)}`;

            }, (err) => alert("GPS Error: Please enable location."), {enableHighAccuracy: true});
        }

        function sendSafeToAll() {
            const d1 = localStorage.getItem('med_d1');
            if(!d1) return;
            const msg = `✅ *STATUS UPDATE: SAFE*\nPatient ${localStorage.getItem('med_name')} is now stable. No further help required.`;
            window.location.href = `https://wa.me/${d1.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
        }

        function renderLogs() {
            const list = document.getElementById('logItems');
            const h = JSON.parse(localStorage.getItem('h_logs') || '[]');
            if(!h.length) { list.innerHTML = '<p class="text-center mt-5 opacity-50">No recent alerts.</p>'; return; }
            list.innerHTML = h.map(l => `
                <div class="glass-card mb-2 d-flex justify-content-between align-items-center">
                    <div>
                        <div class="small fw-bold text-danger">SOS DISPATCHED</div>
                        <div class="x-small text-muted" style="font-size:0.7rem">${l.t}</div>
                    </div>
                    <a href="${l.m}" class="btn btn-sm btn-dark rounded-pill px-3">Map</a>
                </div>
            `).join('');
        }

        window.onload = () => {
            fields.forEach(f => document.getElementById(f).value = localStorage.getItem('med_' + f) || '');
        };
    </script>
</body>
</html>
